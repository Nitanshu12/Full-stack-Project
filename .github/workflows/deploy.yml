
name: Deploy CollabSphere to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ════════════════════════════════════════════════════════
  # JOB 1: DETECT CHANGES
  # Checks which directories have been modified in the commit
  # ════════════════════════════════════════════════════════
  changes:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    outputs:
      terraform: ${{ steps.filter.outputs.terraform }}
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            terraform:
              - 'terraform/**'
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # ════════════════════════════════════════════════════════
  # JOB 2: TERRAFORM — Only runs if terraform/ changed
  # ════════════════════════════════════════════════════════
  terraform:
    name: Provision AWS Infrastructure (Terraform)
    needs: changes
    if: needs.changes.outputs.terraform == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform
        env:
          TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
          TF_VAR_app_name:   collabsphere
          TF_VAR_image_tag:  latest
        run: terraform plan

      - name: Terraform Apply
        working-directory: terraform
        env:
          TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
          TF_VAR_app_name:   collabsphere
          TF_VAR_image_tag:  latest
        run: |
          terraform apply -auto-approve
          echo "✅ AWS Infrastructure applied successfully!"

  # ════════════════════════════════════════════════════════
  # JOB 3: DOCKER BACKEND — Only runs if backend/ changed
  # ════════════════════════════════════════════════════════
  docker-backend:
    name: Build & Push Backend
    needs: [changes, terraform]
    # always() ensures this runs even if terraform was skipped
    if: |
      always() && 
      (needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch') &&
      (needs.terraform.result == 'success' || needs.terraform.result == 'skipped')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: latest
        run: |
          echo "🔨 Building backend image..."
          docker build --tag $ECR_REGISTRY/collabsphere-backend:$IMAGE_TAG ./backend
          echo "📤 Pushing backend image to ECR..."
          docker push $ECR_REGISTRY/collabsphere-backend:$IMAGE_TAG
          echo "✅ Done: $ECR_REGISTRY/collabsphere-backend:$IMAGE_TAG"

  # ════════════════════════════════════════════════════════
  # JOB 4: DOCKER FRONTEND — Only runs if frontend/ changed
  # ════════════════════════════════════════════════════════
  docker-frontend:
    name: Build & Push Frontend
    needs: [changes, terraform]
    # always() ensures this runs even if terraform was skipped
    if: |
      always() && 
      (needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch') &&
      (needs.terraform.result == 'success' || needs.terraform.result == 'skipped')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push frontend Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: latest
        run: |
          echo "🔨 Building frontend image..."
          docker build --tag $ECR_REGISTRY/collabsphere-frontend:$IMAGE_TAG ./frontend
          echo "📤 Pushing frontend image to ECR..."
          docker push $ECR_REGISTRY/collabsphere-frontend:$IMAGE_TAG
          echo "✅ Done: $ECR_REGISTRY/collabsphere-frontend:$IMAGE_TAG"
