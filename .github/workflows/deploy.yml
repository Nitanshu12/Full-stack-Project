
name: Deploy CollabSphere to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:

  # ════════════════════════════════════════════════════════
  # JOB 1: TERRAFORM — Create ECR repos + ECS cluster FIRST
  # ECR repositories must exist before we can push images to them
  # ════════════════════════════════════════════════════════
  terraform:
    name: Provision AWS Infrastructure (Terraform)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform
        env:
          TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
          TF_VAR_app_name:   collabsphere
          TF_VAR_image_tag:  latest
        run: terraform plan

      - name: Terraform Apply
        working-directory: terraform
        env:
          TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
          TF_VAR_app_name:   collabsphere
          TF_VAR_image_tag:  latest
        run: |
          terraform apply -auto-approve
          echo "✅ ECR repositories and ECS cluster are ready!"

  # ════════════════════════════════════════════════════════
  # JOB 2: DOCKER — Build images and push to ECR
  # Runs AFTER terraform so ECR repos already exist
  # ════════════════════════════════════════════════════════
  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: latest
        run: |
          echo "🔨 Building backend image..."
          docker build --tag $ECR_REGISTRY/collabsphere-backend:$IMAGE_TAG ./backend
          echo "📤 Pushing backend image to ECR..."
          docker push $ECR_REGISTRY/collabsphere-backend:$IMAGE_TAG
          echo "✅ Done: $ECR_REGISTRY/collabsphere-backend:$IMAGE_TAG"

      - name: Build and push frontend Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: latest
        run: |
          echo "🔨 Building frontend image..."
          docker build --tag $ECR_REGISTRY/collabsphere-frontend:$IMAGE_TAG ./frontend
          echo "📤 Pushing frontend image to ECR..."
          docker push $ECR_REGISTRY/collabsphere-frontend:$IMAGE_TAG
          echo "✅ Done: $ECR_REGISTRY/collabsphere-frontend:$IMAGE_TAG"
