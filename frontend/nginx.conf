
# Key responsibility: handle React's client-side routing.
# Without this, refreshing /dashboard or /profile gives a 404
# because Nginx looks for a real file at that path.
# "try_files" tells Nginx: if the file doesn't exist, serve index.html
# and let React Router handle the routing in the browser.
# ─────────────────────────────────────────────────────────────

server {
    listen       80;
    server_name  _;             # Accept requests for any hostname

    root   /usr/share/nginx/html;
    index  index.html;

    # ── SPA Routing ───────────────────────────────────────────
    # For every request, try:
    #   1. An exact file match ($uri)
    #   2. A directory match ($uri/)
    #   3. Fall back to index.html (React Router takes over)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static Asset Caching ──────────────────────────────────
    # Vite fingerprints JS/CSS filenames with a content hash (e.g. main.a1b2c3.js)
    # so it is safe to cache them for a full year in the browser.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Never cache index.html ────────────────────────────────
    # index.html is the entry point; it must always be fresh so
    # the browser picks up the latest JS/CSS bundle filenames.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Gzip Compression ─────────────────────────────────────
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;
}
